# Use this Blueprint to deploy n8n on Render as a web
# service that uses a Postgres database to store
# workflow data.
#
# This Blueprint uses free instance types (specified by
# `plan`) for both the web service and the database. You
# can upgrade to paid instance types at any time to
# increase resources.

# render.yaml — Infraestructura como Código para Render.com
# Despliegue de n8n en Render usando imagen Docker + base de datos Postgres

services:
  - type: web
    name: n8n-service
    plan: free
    runtime: image
    image:
      url: docker.io/n8nio/n8n:latest

    envVars:
      # Clave de cifrado (Render la genera automáticamente)
      # No modificar después del primer deploy o perderás acceso a credenciales cifradas
      - key: N8N_ENCRYPTION_KEY
        generateValue: true

      # Puerto interno del servicio
      - key: PORT
        value: 5678

      # Configuración de base de datos (PostgreSQL administrado por Render)
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: n8n-db
          property: database
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: n8n-db
          property: host
      - key: DB_POSTGRESDB_PORT
        fromDatabase:
          name: n8n-db
          property: port
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: n8n-db
          property: user
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: n8n-db
          property: password

      # Entorno de ejecución
      - key: NODE_ENV
        value: production

databases:
  - name: n8n-db
    plan: free
    databaseName: n8n
    user: n8n
